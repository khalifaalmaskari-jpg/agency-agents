name: Security Scan — Pull Request

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, develop, release/**]

permissions:
  contents: read
  security-events: write
  pull-requests: write
  actions: read

jobs:
  trivy-scan:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy (fs)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

    env:
      TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db:2

  semgrep-scan:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep \
            --config=auto \
            --config=p/r2c-security-audit \
            --sarif > semgrep-results.sarif \
            || true

      - name: Upload Semgrep results to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

  codeql-scan:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript, python, go, typescript]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"

  grype-scan:
    name: Grype Container Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image for scanning
        run: |
          if [ -f Dockerfile ]; then
            docker build -t local-app:scan .
          else
            echo "No Dockerfile found — skipping Grype scan"
            exit 0
          fi

      - name: Run Grype
        id: grype
        uses: anchore/scan-action@v5
        with:
          image: local-app:scan
          fail-build: true
          severity-cutoff: high

      - name: Upload Grype results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: grype

  results-summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs: [trivy-scan, semgrep-scan, codeql-scan, grype-scan]
    if: always()
    steps:
      - name: Check scan results
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scanner | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy (Vulns) | ${{ needs.trivy-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "| Semgrep (SAST) | ${{ needs.semgrep-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL | ${{ needs.codeql-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "| Grype (Container) | ${{ needs.grype-scan.result }}" >> $GITHUB_STEP_SUMMARY
